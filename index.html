<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Constants & Data
    const SHEET_ID = '1t_dtZilxleZPcx1s_jJ6IPWh0DvwRn3KiUgKyKJuETs';

    const TRADE_FINANCE_DEFAULT = [
      { product: 'Import Finance', bankRef: 'FI2026261403', counterparty: 'ADV Trading Pty Ltd', customerRef: '', invoiceDate: '02/01/2026', establishDate: '20/02/2026', maturityDate: '01/07/2026', currency: 'AUD', amount: 74690.06, interestRate: '8.03%', paid: false, paidDate: null },
      { product: 'Import Finance', bankRef: 'FI2025225981', counterparty: 'ADV Trading Pty Ltd', customerRef: '', invoiceDate: '20/10/2025', establishDate: '02/12/2025', maturityDate: '17/04/2026', currency: 'AUD', amount: 43911.29, interestRate: '7.77%', paid: true, paidDate: '13/04/2026' },
      { product: 'Import Finance', bankRef: 'FI2025218573', counterparty: 'ADV Trading Pty Ltd', customerRef: '', invoiceDate: '17/10/2025', establishDate: '18/11/2025', maturityDate: '15/04/2026', currency: 'AUD', amount: 26943.34, interestRate: '7.71%', paid: true, paidDate: '13/04/2026' },
      { product: 'TT Refinance', bankRef: 'FT2026282308', counterparty: 'Zhenjiang Towhaul Trailer Co.,Ltd', customerRef: 'TH-26002 FullPay', invoiceDate: '31/03/2026', establishDate: '31/03/2026', maturityDate: '25/09/2026', currency: 'AUD', amount: 46954.96, interestRate: '8.64%', paid: false, paidDate: null },
      { product: 'TT Refinance', bankRef: 'FT2026281009', counterparty: 'Kindle Technology Co., Limited', customerRef: 'NTT71-85 Deposit', invoiceDate: '30/03/2026', establishDate: '30/03/2026', maturityDate: '25/09/2026', currency: 'AUD', amount: 58079.68, interestRate: '8.63%', paid: false, paidDate: null },
      { product: 'TT Refinance', bankRef: 'FT2026278335', counterparty: 'Guangdong Ecocampor Vehicle Co., Ltd', customerRef: 'NTT62-67 Deposit', invoiceDate: '24/03/2026', establishDate: '24/03/2026', maturityDate: '18/09/2026', currency: 'AUD', amount: 60113.14, interestRate: '8.65%', paid: false, paidDate: null },
      { product: 'TT Refinance', bankRef: 'FT2026277528', counterparty: 'Guangdong Ecocampor Vehicle Co., Ltd', customerRef: 'NTT57-58 Full pay', invoiceDate: '23/03/2026', establishDate: '23/03/2026', maturityDate: '18/09/2026', currency: 'AUD', amount: 46723.51, interestRate: '8.62%', paid: false, paidDate: null },
    ];

    // Load paid status from localStorage, merging with defaults
    const loadTradeFinance = () => {
      try {
        const saved = JSON.parse(localStorage.getItem('tf_paid_status') || '{}');
        return TRADE_FINANCE_DEFAULT.map(tf => ({
          ...tf,
          paid: saved[tf.bankRef] !== undefined ? saved[tf.bankRef].paid : tf.paid,
          paidDate: saved[tf.bankRef] !== undefined ? saved[tf.bankRef].paidDate : tf.paidDate,
        }));
      } catch (e) { return TRADE_FINANCE_DEFAULT; }
    };

    const saveTradeFinancePaidStatus = (tradeFinance) => {
      const status = {};
      tradeFinance.forEach(tf => { status[tf.bankRef] = { paid: tf.paid, paidDate: tf.paidDate }; });
      localStorage.setItem('tf_paid_status', JSON.stringify(status));
    };

    const CONTAINERS_SAMPLE = [
      { pivotOrder: 'PFS-8230', container: 'TEMU8834521', vessel: 'CMA CGM MARCO POLO', origin: 'Ningbo, China', destination: 'Brisbane, AU', etd: '28-Mar-2026', eta: '22-Apr-2026', status: 'In Transit', progress: 65, supplier: 'Kindle Technology', models: 'NTT71-85 (15x Tradesman 8x5)' },
      { pivotOrder: 'PFS-8215', container: 'MSCU7291034', vessel: 'MSC ANNA', origin: 'Guangzhou, China', destination: 'Brisbane, AU', etd: '20-Mar-2026', eta: '18-Apr-2026', status: 'In Transit', progress: 78, supplier: 'Ecocampor Vehicle', models: 'NTT62-67 (6x Motorbike Trailer Dual)' },
      { pivotOrder: 'PFS-8198', container: 'TCKU6543219', vessel: 'COSCO SHIPPING LEO', origin: 'Zhenjiang, China', destination: 'Brisbane, AU', etd: '15-Mar-2026', eta: '12-Apr-2026', status: 'Arrived - Awaiting Clearance', progress: 95, supplier: 'Zhenjiang Towhaul', models: 'TH-26002 (1x Combo XL)' },
      { pivotOrder: 'PFS-8245', container: 'OOLU8127463', vessel: 'EVER GIVEN', origin: 'Guangzhou, China', destination: 'Sydney, AU', etd: '02-Apr-2026', eta: '30-Apr-2026', status: 'Departed Origin', progress: 25, supplier: 'Ecocampor Vehicle', models: 'NTT57-58 (2x Apex Toy Hauler)' },
    ];

    // Utility Functions
    const formatCurrency = (num) => {
      if (typeof num !== 'number') return '$0.00';
      return '$' + num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    };

    const formatDate = (dateStr) => {
      if (!dateStr) return '';
      try {
        const parts = dateStr.split('/');
        if (parts.length === 3) {
          const d = new Date(parts[2], parts[1] - 1, parts[0]);
          return d.toLocaleDateString('en-AU', { day: '2-digit', month: 'short', year: 'numeric' });
        }
      } catch (e) {}
      return dateStr;
    };

    const calculateDaysUntilMaturity = (dateStr) => {
      try {
        const parts = dateStr.split('/');
        if (parts.length === 3) {
          const maturityDate = new Date(parts[2], parts[1] - 1, parts[0]);
          const today = new Date('2026-04-13');
          const diff = Math.ceil((maturityDate - today) / 86400000);
          return diff;
        }
      } catch (e) {}
      return 0;
    };

    const parseGoogleSheetsResponse = (jsonString) => {
      try {
        const stripped = jsonString.replace(/^\/\*O_o\*\/\s*/, '');
        const cleaned = stripped.replace(/^google\.visualization\.Query\.setResponse\(/, '').replace(/\);?\s*$/, '');
        return JSON.parse(cleaned);
      } catch (e) {
        console.error('Parse error:', e);
        return null;
      }
    };

    const extractTableData = (response) => {
      if (!response || !response.table || !response.table.rows) return [];
      const cols = response.table.cols || [];
      const rows = response.table.rows || [];
      return rows.map(row => {
        const obj = {};
        (row.c || []).forEach((cell, idx) => {
          const colLabel = cols[idx] ? cols[idx].label : 'col_' + idx;
          obj[colLabel] = cell ? cell.v : null;
        });
        return obj;
      });
    };

    const fetchGoogleSheet = async (sheetName) => {
      const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheetName);
      try {
        const res = await fetch(url);
        const text = await res.text();
        const parsed = parseGoogleSheetsResponse(text);
        return extractTableData(parsed);
      } catch (e) {
        console.error('Fetch error for ' + sheetName + ':', e);
        return [];
      }
    };

    // Chart Components
    const StockByModelChart = ({ data }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !data || data.length === 0) return;

        const modelCounts = {};
        data.forEach(item => {
          const model = item.Model || 'Unknown';
          modelCounts[model] = (modelCounts[model] || 0) + 1;
        });

        const sortedModels = Object.entries(modelCounts).sort((a, b) => b[1] - a[1]).slice(0, 10);
        const ctx = canvasRef.current.getContext('2d');

        if (chartRef.current) chartRef.current.destroy();

        chartRef.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: sortedModels.map(m => m[0]),
            datasets: [{ label: 'Count', data: sortedModels.map(m => m[1]), backgroundColor: '#3b82f6', borderRadius: 8, borderSkipped: false }],
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
          },
        });

        return () => {
          if (chartRef.current) chartRef.current.destroy();
        };
      }, [data]);

      return <div style={{ height: '250px' }}><canvas ref={canvasRef}></canvas></div>;
    };

    const StockByStatusChart = ({ data }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !data || data.length === 0) return;

        const statusCounts = {};
        data.forEach(item => {
          const status = item.Status || 'Unknown';
          statusCounts[status] = (statusCounts[status] || 0) + 1;
        });

        const ctx = canvasRef.current.getContext('2d');
        if (chartRef.current) chartRef.current.destroy();

        const colors = { 'In Stock': '#3b82f6', 'Collected': '#1e40af', 'Paid in Full': '#f59e0b', 'Deposit Paid': '#fbbf24' };

        chartRef.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: Object.keys(statusCounts),
            datasets: [{ data: Object.values(statusCounts), backgroundColor: Object.keys(statusCounts).map(s => colors[s] || '#9ca3af'), borderColor: 'white', borderWidth: 2 }],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
        });

        return () => {
          if (chartRef.current) chartRef.current.destroy();
        };
      }, [data]);

      return <div style={{ height: '250px' }}><canvas ref={canvasRef}></canvas></div>;
    };

    const WarehouseChart = ({ data }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !data || data.length === 0) return;

        const warehouseCounts = {};
        data.forEach(item => {
          const warehouse = item.Warehouse || 'Unknown';
          warehouseCounts[warehouse] = (warehouseCounts[warehouse] || 0) + 1;
        });

        const ctx = canvasRef.current.getContext('2d');
        if (chartRef.current) chartRef.current.destroy();

        const colors = { 'Jade': '#10b981', 'Expansion': '#a855f7', 'Sydney': '#06b6d4' };

        chartRef.current = new Chart(ctx, {
          type: 'pie',
          data: {
            labels: Object.keys(warehouseCounts),
            datasets: [{ data: Object.values(warehouseCounts), backgroundColor: Object.keys(warehouseCounts).map(w => colors[w] || '#9ca3af'), borderColor: 'white', borderWidth: 2 }],
          },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } },
        });

        return () => {
          if (chartRef.current) chartRef.current.destroy();

    const LeadDetailModal = ({ lead, onClose, onStageChange, onDelete, onEdit }) => {
      const [activities, setActivities] = useState([]);
      const [newNote, setNewNote] = useState('');
      const [detailTab, setDetailTab] = useState('details');

      useEffect(() => {
        CRMData.getActivities(lead.id).then(setActivities);
      }, [lead.id]);

      const handleAddNote = async () => {
        if (!newNote.trim()) return;
        await CRMData.addActivity(lead.id, 'note', newNote);
        setNewNote('');
        const updated = await CRMData.getActivities(lead.id);
        setActivities(updated);
      };

      const currentStageIdx = CRM_STAGES.findIndex(s => s.id === lead.stage);

      const activityTypeIcons = {
        'stage_change': ICONS.arrow,
        'note': ICONS.note,
        'call': ICONS.phone,
        'email': ICONS.email,
      };

      const activityTypeColors = {
        'stage_change': '#3b82f6',
        'note': '#f59e0b',
        'call': '#10b981',
        'email': '#8b5cf6',
      };

      return (
        <div className="crm-modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>

              <div>
                <h3 className="text-lg font-bold text-gray-900">{lead.name}</h3>

                <button onClick={() => { if (confirm('Delete this lead?')) { onDelete(lead.id); onClose(); } }} className="px-3 py-1.5 text-xs rounded-lg bg-red-50 text-red-600 hover:bg-red-100">Delete</button>
                <button onClick={onClose} className="text-gray-500 hover:text-gray-700 text-2xl ml-2">{'\u00D7'}</button>
              </div>
            </div>

            {/* Stage Progress */}
            <div style={{ padding: '16px 24px', background: '#f8fafc', borderBottom: '1px solid #e2e8f0' }}>
              <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
                {CRM_STAGES.filter(s => s.id !== 'lost').map((stage, idx) => {
                  const isActive = stage.id === lead.stage;
                  const isPast = idx < currentStageIdx && lead.stage !== 'lost';
                  return (
                    <div key={stage.id} style={{ flex: 1, textAlign: 'center' }}>
                      <div
                        onClick={() => onStageChange(lead.id, stage.id)}
                        style={{
                          height: '6px', borderRadius: '3px', cursor: 'pointer',
                          background: isActive ? stage.color : isPast ? stage.color + '80' : '#e2e8f0',
                          transition: 'all 0.2s',
                        }}
                      ></div>
                      <div style={{ fontSize: '10px', marginTop: '4px', color: isActive ? stage.color : '#94a3b8', fontWeight: isActive ? 700 : 400 }}>
                        {stage.label}
                      </div>
                    </div>
                  );
                })}
              </div>
              {lead.stage === 'lost' && <div style={{ textAlign: 'center', marginTop: '8px' }}><span className="badge badge-red">LOST</span></div>}
            </div>

            {/* Tabs */}
            <div style={{ display: 'flex', borderBottom: '1px solid #e2e8f0', padding: '0 24px' }}>
              {['details', 'activity', 'meta'].map(tab => (
                <div key={tab} className={'crm-tab' + (detailTab === tab ? ' crm-tab-active' : '')} onClick={() => setDetailTab(tab)}>
                  {tab === 'details' ? 'Details' : tab === 'activity' ? 'Activity' : 'Meta Data'}

              ))}
            </div>

            <div className="crm-modal-body">
              {detailTab === 'details' && (
                <div>
                  <div className="grid grid-cols-2 gap-4">
                    <div><p className="text-xs text-gray-500">Email</p><p className="text-sm font-medium">{lead.email || '-'}</p></div>
                    <div><p className="text-xs text-gray-500">Phone</p><p className="text-sm font-medium">{lead.phone || '-'}</p></div>
                    <div><p className="text-xs text-gray-500">Source</p><p className="text-sm"><SourceBadge source={lead.source} /></p></div>
                    <div><p className="text-xs text-gray-500">Deal Value</p><p className="text-sm font-bold text-green-600">{lead.deal_value ? formatCurrency(lead.deal_value) : '-'}</p></div>
                    <div><p className="text-xs text-gray-500">Assigned To</p><p className="text-sm font-medium">{lead.assigned_to || '-'}</p></div>
                    <div><p className="text-xs text-gray-500">Created</p><p className="text-sm">{lead.created_at ? new Date(lead.created_at).toLocaleDateString('en-AU') : '-'}</p></div>
                  </div>
                  {lead.notes && (
                    <div style={{ marginTop: '16px', padding: '12px', background: '#f8fafc', borderRadius: '8px' }}>
                      <p className="text-xs text-gray-500 font-semibold mb-1">Notes</p>
                      <p className="text-sm text-gray-700">{lead.notes}</p>
                    </div>

                  {/* Quick move buttons */}
                  <div style={{ marginTop: '16px' }}>
                    <p className="text-xs text-gray-500 font-semibold mb-2">Move to Stage</p>
                    <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap' }}>
                      {CRM_STAGES.filter(s => s.id !== lead.stage).map(stage => (
                        <button key={stage.id} className="crm-move-btn" style={{ borderColor: stage.color + '40' }}
                          onClick={() => onStageChange(lead.id, stage.id)}>
                          {stage.icon} {stage.label}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {detailTab === 'activity' && (
                <div>
                  <div style={{ display: 'flex', gap: '8px', marginBottom: '16px' }}>
                    <input className="crm-form-input" value={newNote} onChange={e => setNewNote(e.target.value)}
                      placeholder="Add a note..." onKeyDown={e => { if (e.key === 'Enter') handleAddNote(); }} style={{ flex: 1 }} />
                    <button onClick={handleAddNote} className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm">Add</button>
                  </div>
                  <div>
                    {activities.length === 0 && <p className="text-sm text-gray-400 text-center py-4">No activity yet</p>}
                    {activities.map(act => (
                      <div key={act.id} className="crm-activity-item">
                        <div className="crm-activity-dot" style={{ backgroundColor: activityTypeColors[act.type] || '#94a3b8' }}></div>
                        <div style={{ flex: 1 }}>
                          <p className="text-sm text-gray-800">{activityTypeIcons[act.type] || ''} {act.note}</p>
                          <p className="text-xs text-gray-400 mt-1">{act.created_at ? new Date(act.created_at).toLocaleString('en-AU') : ''}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {detailTab === 'meta' && (
                <div>
                  {lead.source === 'Meta Ads' ? (

                      <div style={{ padding: '16px', background: '#eff6ff', borderRadius: '10px', border: '1px solid #bfdbfe' }}>

                        <div className="grid grid-cols-2 gap-3">
                          <div><p className="text-xs text-blue-600">Meta Lead ID</p><p className="text-sm font-mono">{lead.meta_lead_id || 'N/A'}</p></div>
                          <div><p className="text-xs text-blue-600">FB Click ID (fbclid)</p><p className="text-sm font-mono" style={{ wordBreak: 'break-all' }}>{lead.fbclid || 'N/A'}</p></div>
                          <div><p className="text-xs text-blue-600">Campaign</p><p className="text-sm font-medium">{lead.campaign_name || 'N/A'}</p></div>
                          <div><p className="text-xs text-blue-600">CAPI Status</p><p className="text-sm">{lead.fbclid ? <span className="badge badge-green">Trackable</span> : <span className="badge badge-amber">No fbclid</span>}</p></div>
                        </div>
                      </div>
                      <div style={{ padding: '12px', background: '#f0fdf4', borderRadius: '8px', border: '1px solid #bbf7d0' }}>
                        <p className="text-xs text-green-700 font-semibold mb-1">CAPI Feedback Loop</p>
                        <p className="text-xs text-green-600">When you move this lead through stages, conversion events are automatically sent back to Meta via the Conversions API. This helps Meta optimise your ad targeting based on real deal outcomes.</p>
                      </div>
                    </div>
                  ) : (
                    <div className="text-center py-8">
                      <p className="text-gray-400 text-sm">This lead did not come from Meta Ads</p>
                      <p className="text-gray-400 text-xs mt-2">Meta attribution data is only available for leads captured via Meta Lead Ads</p>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    const CRMKPIs = ({ leads }) => {
      const totalLeads = leads.length;
      const pipelineValue = leads.filter(l => !['won', 'lost'].includes(l.stage)).reduce((sum, l) => sum + (l.deal_value || 0), 0);
      const wonDeals = leads.filter(l => l.stage === 'won');
      const wonValue = wonDeals.reduce((sum, l) => sum + (l.deal_value || 0), 0);
      const closedDeals = leads.filter(l => ['won', 'lost'].includes(l.stage));
      const conversionRate = closedDeals.length > 0 ? Math.round((wonDeals.length / closedDeals.length) * 100) : 0;
      const metaLeads = leads.filter(l => l.source === 'Meta Ads').length;

      return (
        <div className="grid grid-cols-1 md:grid-cols-5 gap-6 mb-6">
          <KPICard title="Total Leads" value={totalLeads} icon={ICONS.people} color="text-blue-500" />
          <KPICard title="Pipeline Value" value={formatCurrency(pipelineValue)} icon={ICONS.money} color="text-purple-500" />
          <KPICard title="Won Value" value={formatCurrency(wonValue)} icon={ICONS.trophy} color="text-green-500" />
          <KPICard title="Win Rate" value={conversionRate + '%'} icon={ICONS.target} color="text-amber-500" />
          <KPICard title="Meta Leads" value={metaLeads} icon={ICONS.megaphone} color="text-blue-600" />
        </div>
      );
    };

    // KPI Card Component
    const KPICard = ({ title, value, icon, color }) => (
      <div className="kpi-card">
        <div className="flex items-start justify-between">
          <div>
            <p className="text-gray-600 text-sm font-medium mb-4">{title}</p>
            <p className="text-3xl font-bold text-gray-900">{value}</p>
          </div>
          <div className={'text-4xl ' + color}>{icon}</div>
        </div>
      </div>
    );

    // Page Components
    const DashboardPage = ({ inventoryData, containerArrivalsData, pricingData, lastUpdated, tradeFinance, togglePaid }) => {
      const totalStock = inventoryData.length;
      const inStock = inventoryData.filter(i => i.Status === 'In Stock').length;
      const soldCollected = inventoryData.filter(i => ['Collected', 'Paid in Full', 'Deposit Paid'].includes(i.Status)).length;
      const stockValue = inventoryData.reduce((sum, i) => sum + (parseFloat(i['Cost Value']) || 0), 0);
      const nevdisCompleted = inventoryData.filter(i => i.NEVDIS === 'Completed').length;
      const ravCompleted = inventoryData.filter(i => i.RAV === 'Completed').length;
      const complianceRate = totalStock > 0 ? Math.round(((nevdisCompleted + ravCompleted) / (totalStock * 2)) * 100) : 0;
      const activeTF = tradeFinance.filter(tf => !tf.paid);
      const tradeFinanceTotal = activeTF.reduce((sum, tf) => sum + tf.amount, 0);
      const dueWithin30 = activeTF.filter(tf => { const days = calculateDaysUntilMaturity(tf.maturityDate); return days >= 0 && days <= 30; });
      const hasDueSoon = dueWithin30.length > 0;
      const sortedByMaturity = [...activeTF].sort((a, b) => calculateDaysUntilMaturity(a.maturityDate) - calculateDaysUntilMaturity(b.maturityDate));
      const next5Due = sortedByMaturity.slice(0, 5);
      const upcomingTF = dueWithin30.length >= next5Due.length ? dueWithin30 : next5Due;
      const upcomingTFSorted = [...upcomingTF].sort((a, b) => calculateDaysUntilMaturity(a.maturityDate) - calculateDaysUntilMaturity(b.maturityDate));
      const paidTF = tradeFinance.filter(tf => tf.paid);
      const paidTotal = paidTF.reduce((sum, tf) => sum + tf.amount, 0);
      const containersInTransit = CONTAINERS_SAMPLE.filter(c => c.status === 'In Transit').length;
      const recentSales = inventoryData.filter(i => ['Collected', 'Paid in Full'].includes(i.Status)).slice(0, 5);

      return (
        <div className="space-y-8">
          <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
            <KPICard title="Total Stock" value={totalStock} icon={ICONS.package} color="text-blue-500" />
            <KPICard title="In Stock" value={inStock} icon={ICONS.chart} color="text-green-500" />
            <KPICard title="Sold/Collected" value={soldCollected} icon={ICONS.checkmark} color="text-amber-500" />
            <KPICard title="Stock Value" value={formatCurrency(stockValue)} icon={ICONS.money} color="text-purple-500" />
            <KPICard title="Compliance" value={complianceRate + '%'} icon={ICONS.check} color="text-emerald-500" />
          </div>

          <div className={'banner-alert ' + (hasDueSoon ? 'banner-alert-red-amber' : 'banner-blue')}>
            <div>
              <p className="font-bold text-lg">Trade Finance Alert</p>
              <p className="text-sm opacity-90 mt-2">
                Total Outstanding: <span className="font-bold">{formatCurrency(tradeFinanceTotal)}</span> {ICONS.bullet} {dueWithin30.length} facilities due within 30 days{paidTF.length > 0 && <span> {ICONS.bullet} {paidTF.length} paid ({formatCurrency(paidTotal)})</span>}
              </p>
            </div>
            <a href="#trade-finance" className="underline hover:opacity-80 whitespace-nowrap ml-4" style={{ cursor: 'pointer' }}>
              View Details {ICONS.arrow}
            </a>
          </div>

          <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 overflow-x-auto">
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-lg font-bold text-gray-900">Upcoming Trade Finance</h3>
              <span className="text-xs text-gray-500">{upcomingTFSorted.length} facilities shown (due within 30 days or next 5, whichever is greater)</span>
            </div>
            <table className="status-table">
              <thead>
                <tr>
                  <th>Bank Ref</th>
                  <th>Product</th>
                  <th>Counterparty</th>
                  <th>Customer Ref</th>
                  <th>Amount (AUD)</th>
                  <th>Maturity Date</th>
                  <th>Status</th>
                  <th>Rate</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                {upcomingTFSorted.map((item, idx) => {
                  const days = calculateDaysUntilMaturity(item.maturityDate);
                  return (
                    <tr key={idx}>
                      <td className="font-mono text-xs">{item.bankRef}</td>
                      <td className="text-sm">{item.product}</td>
                      <td className="text-sm">{item.counterparty}</td>
                      <td className="text-xs">{item.customerRef || '-'}</td>
                      <td className="font-semibold">{formatCurrency(item.amount)}</td>
                      <td>{formatDate(item.maturityDate)}</td>
                      <td><MaturityBadge days={days} /></td>
                      <td>{item.interestRate}</td>
                      <td><button onClick={() => togglePaid(item.bankRef)} className="px-2 py-1 text-xs rounded bg-green-100 text-green-700 hover:bg-green-200 transition whitespace-nowrap">Mark Paid</button></td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr className="border-t-2 border-gray-300 bg-gray-50 font-bold">
                  <td colSpan="4">TOTAL</td>
                  <td>{formatCurrency(upcomingTFSorted.reduce((sum, tf) => sum + tf.amount, 0))}</td>
                  <td colSpan="4"></td>
                </tr>
              </tfoot>
            </table>
          </div>

          {paidTF.length > 0 && (
          <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100 overflow-x-auto">
            <div className="flex justify-between items-center mb-4">
              <h3 className="text-lg font-bold text-gray-900">Paid Facilities</h3>
              <span className="text-xs text-gray-500">{paidTF.length} paid {ICONS.bullet} {formatCurrency(paidTotal)}</span>
            </div>
            <table className="status-table">
              <thead>
                <tr>
                  <th>Bank Ref</th>
                  <th>Product</th>
                  <th>Counterparty</th>
                  <th>Amount (AUD)</th>
                  <th>Maturity Date</th>
                  <th>Paid Date</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                {paidTF.map((item, idx) => (
                  <tr key={idx} className="opacity-60">
                    <td className="font-mono text-xs">{item.bankRef}</td>
                    <td className="text-sm">{item.product}</td>
                    <td className="text-sm">{item.counterparty}</td>
                    <td className="font-semibold line-through">{formatCurrency(item.amount)}</td>
                    <td>{formatDate(item.maturityDate)}</td>
                    <td><span className="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">Paid {item.paidDate || ''}</span></td>
                    <td><button onClick={() => togglePaid(item.bankRef)} className="px-2 py-1 text-xs rounded bg-yellow-100 text-yellow-700 hover:bg-yellow-200 transition whitespace-nowrap">Undo</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          )}

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
              <h3 className="text-lg font-bold text-gray-900 mb-4">Stock by Model</h3>
              <StockByModelChart data={inventoryData} />
            </div>
            <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
              <h3 className="text-lg font-bold text-gray-900 mb-4">Stock by Status</h3>
              <StockByStatusChart data={inventoryData} />
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 bg-white rounded-xl p-6 shadow-sm border border-gray-100">
              <h3 className="text-lg font-bold text-gray-900 mb-4">Recent Sales</h3>
              <table className="status-table">
                <thead>
                  <tr>
                    <th>VIN</th>
                    <th>Model</th>
                    <th>Status</th>
                    <th>Customer</th>
                    <th>Sale Price</th>
                  </tr>
                </thead>
                <tbody>
                  {recentSales.map((item, idx) => (
                    <tr key={idx}>
                      <td className="font-mono text-xs">{item.VIN || '-'}</td>
                      <td>{item.Model || '-'}</td>
                      <td><StatusBadge status={item.Status} /></td>
                      <td>{item['Assigned Customer'] || '-'}</td>
                      <td>{formatCurrency(parseFloat(item['Sold Price (inc. Gst)']) || 0)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
              <h3 className="text-lg font-bold text-gray-900 mb-4">Warehouse Distribution</h3>
              <WarehouseChart data={inventoryData} />
            </div>
          </div>

          <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
            <h3 className="text-lg font-bold text-gray-900 mb-4">Containers In Transit</h3>
            <p className="text-gray-600 text-sm mb-4">{containersInTransit} containers currently shipping</p>

      const avgRRP = data.reduce((sum, p) => sum + (parseFloat(p['RRP (inc. gst)']) || 0), 0) / models;
      const avgMargin = avgRRP - avgCost;
      const avgMarginPercent = avgCost > 0 ? (avgMargin / avgCost * 100) : 0;
      const totalCost = data.reduce((sum, p) => sum + (parseFloat(p['Cost Price (ex.gst)']) || 0), 0);
      const totalRRP = data.reduce((sum, p) => sum + (parseFloat(p['RRP (inc. gst)']) || 0), 0);

      return (

            <KPICard title="Avg RRP" value={formatCurrency(avgRRP)} icon={ICONS.dollarSign} color="text-green-500" />
            <KPICard title="Avg Margin %" value={avgMarginPercent.toFixed(1) + '%'} icon={ICONS.chartUp} color="text-purple-500" />

                  <th>Model</th>
                  <th>Cost (ex GST)</th>
                  <th>RRP (inc GST)</th>
                  <th>Margin ($)</th>
                  <th>Margin (%)</th>
                </tr>
              </thead>
              <tbody>
                {data.map((item, idx) => {
                  const cost = parseFloat(item['Cost Price (ex.gst)']) || 0;
                  const rrp = parseFloat(item['RRP (inc. gst)']) || 0;
                  const margin = rrp - cost;
                  const marginPercent = cost > 0 ? (margin / cost * 100) : 0;
                  return (
                    <tr key={idx}>

                      <td>{formatCurrency(cost)}</td>
                      <td>{formatCurrency(rrp)}</td>
                      <td>{formatCurrency(margin)}</td>
                      <td className="font-semibold text-green-600">{marginPercent.toFixed(1)}%</td>
                    </tr>
                  );
                })}
                <tr className="border-t-2 border-gray-300 bg-gray-50 font-bold">
                  <td>TOTALS</td>
                  <td>{formatCurrency(totalCost)}</td>
                  <td>{formatCurrency(totalRRP)}</td>

              </tbody>
            </table>
          </div>
        </div>

          {/* Modals */}
          {showAddModal && (
            <AddLeadModal
              onClose={() => { setShowAddModal(false); setEditLead(null); }}
              onSave={handleSaveLead}
              editLead={editLead}
            />
          )}

          {selectedLead && (
            <LeadDetailModal
              lead={selectedLead}
              onClose={() => setSelectedLead(null)}
              onStageChange={handleStageChange}
              onDelete={handleDeleteLead}
              onEdit={handleEditFromDetail}
            />
          )}
        </div>
      );
    };

    const SettingsPage = () => (
      <div className="space-y-6">
        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
          <h3 className="text-lg font-bold text-gray-900 mb-4">Data Source Information</h3>
          <div className="space-y-4">
            <div>
              <p className="text-sm text-gray-600 font-semibold">Sheet ID</p>
              <p className="font-mono text-sm text-gray-800 break-all">{SHEET_ID}</p>
            </div>
            <div>
              <p className="text-sm text-gray-600 font-semibold">Tabs</p>
              <ul className="text-sm text-gray-800 space-y-1">
                <li>{ICONS.bullet} NT Trailers Trailers (main stock)</li>
                <li>{ICONS.bullet} Container Arrivals (shipping)</li>
                <li>{ICONS.bullet} Pricing (model pricing)</li>
              </ul>
            </div>
            <div>
              <p className="text-sm text-gray-600 font-semibold">Last Refresh</p>
              <p className="text-sm text-gray-800">Use the refresh button in the top bar to fetch latest data</p>
            </div>
          </div>
        </div>

        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
          <h3 className="text-lg font-bold text-gray-900 mb-4">CRM Configuration</h3>
          <div className="space-y-4">
            <div>
              <p className="text-sm text-gray-600 font-semibold">Supabase</p>
              <p className="text-sm text-gray-800">{supabaseClient ? <span className="badge badge-green">Connected</span> : <span className="badge badge-amber">Not configured - using localStorage</span>}</p>
              {!supabaseClient && <p className="text-xs text-gray-500 mt-1">Set SUPABASE_CONFIG.url and anonKey in index.html to connect to Supabase</p>}
            </div>
            <div>
              <p className="text-sm text-gray-600 font-semibold">Meta Conversions API</p>
              <p className="text-sm text-gray-800"><span className="badge badge-blue">Ready</span> - events fire on deal stage changes for Meta leads</p>
              <p className="text-xs text-gray-500 mt-1">Configure META_PIXEL_ID and META_ACCESS_TOKEN in Vercel environment variables</p>
            </div>
            <div>
              <p className="text-sm text-gray-600 font-semibold">Meta Lead Ads Webhook</p>
              <p className="text-sm text-gray-800">Endpoint: /api/meta-webhook</p>
              <p className="text-xs text-gray-500 mt-1">Configure in Meta Business Suite under Leads Access</p>
            </div>
          </div>
        </div>

        <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-100">
          <h3 className="text-lg font-bold text-gray-900 mb-4">Version Information</h3>
          <div className="space-y-2">
            <p className="text-sm text-gray-800"><span className="font-semibold">Version:</span> 2.0</p>
            <p className="text-sm text-gray-800"><span className="font-semibold">Status:</span> Live Sheet Data + CRM</p>
          </div>
        </div>
      </div>
    );

    // Main App Component
    const App = () => {
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [inventoryData, setInventoryData] = useState([]);
      const [containerArrivalsData, setContainerArrivalsData] = useState([]);
      const [pricingData, setPricingData] = useState([]);
      const [lastUpdated, setLastUpdated] = useState(new Date());
      const [loading, setLoading] = useState(true);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [tradeFinance, setTradeFinance] = useState(loadTradeFinance());
      const [crmLeads, setCrmLeads] = useState([]);

      const togglePaid = (bankRef) => {
        setTradeFinance(prev => {
          const updated = prev.map(tf => tf.bankRef === bankRef ? { ...tf, paid: !tf.paid, paidDate: !tf.paid ? new Date().toLocaleDateString('en-AU', { day: '2-digit', month: '2-digit', year: 'numeric' }) : null } : tf);
          saveTradeFinancePaidStatus(updated);
          return updated;
        });
      };

      const loadData = async () => {
        setLoading(true);
        try {
          const [inventory, containers, pricing] = await Promise.all([
            fetchGoogleSheet('NT Trailers Trailers'),
            fetchGoogleSheet('Container Arrivals'),
            fetchGoogleSheet('Pricing'),
          ]);
          setInventoryData(inventory);
          setContainerArrivalsData(containers);
          setPricingData(pricing);
          setLastUpdated(new Date());
        } catch (e) {
          console.error('Data load error:', e);
        }
        setLoading(false);
      };

      useEffect(() => {
        loadData();
        // Initialize CRM data
        initDemoLeads();
        CRMData.loadLeads().then(setCrmLeads);
      }, []);

      useEffect(() => {
        const hash = window.location.hash.slice(1) || 'dashboard';
        setCurrentPage(hash);
      }, []);

      useEffect(() => {
        window.location.hash = currentPage;
      }, [currentPage]);

      const handleNavClick = (page) => {
        setCurrentPage(page);
        setMobileMenuOpen(false);
      };

      const pages = {
        dashboard: { title: 'Dashboard', component: <DashboardPage inventoryData={inventoryData} containerArrivalsData={containerArrivalsData} pricingData={pricingData} lastUpdated={lastUpdated} tradeFinance={tradeFinance} togglePaid={togglePaid} /> },
        inventory: { title: 'Inventory', component: <InventoryPage data={inventoryData} /> },
        containers: { title: 'Containers', component: <ContainersPage containerArrivalsData={containerArrivalsData} /> },
        'trade-finance': { title: 'Trade Finance', component: <TradeFinancePage tradeFinance={tradeFinance} togglePaid={togglePaid} /> },
        pricing: { title: 'Pricing', component: <PricingPage data={pricingData} /> },
        crm: { title: 'CRM', component: <CRMPage crmLeads={crmLeads} setCrmLeads={setCrmLeads} /> },
        settings: { title: 'Settings', component: <SettingsPage /> },
      };

      const pageInfo = pages[currentPage] || pages.dashboard;

      return (
        <div className="flex h-screen bg-gray-50">
          <div className={'sidebar ' + (mobileMenuOpen ? 'open' : '')}>
            <div className="p-6 border-b border-slate-700">
              <div className="bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl p-4 text-white mb-4">
                <p className="text-2xl font-bold">NT</p>
                <p className="text-xs opacity-90 mt-1">Master Control</p>
              </div>
            </div>

            <nav className="flex-1 overflow-y-auto py-6 px-3">
              {[
                { id: 'dashboard', label: 'Dashboard', icon: ICONS.chart },
                { id: 'inventory', label: 'Inventory', icon: ICONS.package },
                { id: 'containers', label: 'Containers', icon: ICONS.ship },
                { id: 'trade-finance', label: 'Trade Finance', icon: ICONS.money },
                { id: 'pricing', label: 'Pricing', icon: ICONS.dollarSign },
                { id: 'crm', label: 'CRM', icon: ICONS.people },
                { id: 'settings', label: 'Settings', icon: ICONS.gear },
              ].map(item => (
                <div key={item.id}>
                  <div
                    onClick={() => handleNavClick(item.id)}
                    className={'nav-item ' + (currentPage === item.id ? 'active' : '')}
                  >
                    <span>{item.icon}</span>
                    <span>{item.label}</span>
                    {item.badge && <span className="ml-auto text-xs bg-yellow-400 text-yellow-900 px-2 py-1 rounded">{item.badge}</span>}
                  </div>
                </div>
              ))}
            </nav>

            <div className="p-6 border-t border-slate-700 text-center">
              <p className="text-xs text-slate-400">v2.0 - CRM + Meta</p>
            </div>
          </div>

          <div className="main-content flex-1 overflow-auto">
            <div className="bg-white border-b border-gray-200 sticky top-0 z-30">
              <div className="px-8 py-4 flex justify-between items-center">
                <div className="flex items-center gap-4">
                  <button
                    onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                    className="mobile-menu-toggle text-2xl md:hidden"
                  >
                    {'\u2630'}
                  </button>
                  <div>
                    <h1 className="text-2xl font-bold text-gray-900">{pageInfo.title}</h1>
                    <p className="text-xs text-gray-500 mt-1">Last updated: {lastUpdated.toLocaleTimeString('en-AU')}</p>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <button
                    onClick={loadData}
                    className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
                  >
                    {ICONS.refresh} Refresh
                  </button>
                  <div className="w-10 h-10 bg-gray-300 rounded-full flex items-center justify-center font-bold text-gray-700">
                    L
                  </div>
                  <div>
                    <p className="text-sm font-semibold text-gray-900">Luke</p>
                    <p className="text-xs text-gray-500">Admin</p>
                  </div>
                </div>
              </div>
            </div>

            <div className="p-8">
              {loading ? (
                <div className="flex items-center justify-center h-96">
                  <div className="text-center">
                    <p className="text-gray-500 text-lg">Loading data...</p>
                  </div>
                </div>
              ) : (
                pageInfo.component
              )}
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
